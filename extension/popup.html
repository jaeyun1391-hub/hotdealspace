<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>핫딜우주 수집기</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>핫딜우주 수집기</h1>

      <label>
        사이트 주소
        <input id="siteUrl" type="url" placeholder="https://www.hotdealspace.com" />
      </label>

      <label>
        관리자 토큰
        <input id="adminToken" type="password" placeholder="ADMIN_UPDATE_TOKEN" />
      </label>

      <button id="saveSettings" type="button">설정 저장</button>

      <div class="split"></div>

      <button id="openGoldbox" type="button">골드박스 열기</button>
      <button id="openSeller" type="button">판매자특가 열기</button>
      <button id="scrapeCurrent" type="button" class="primary">현재 탭 수집</button>
      <button id="sendProducts" type="button" class="primary">사이트로 전송</button>

      <p id="status">쿠팡 특가 페이지를 열고 수집을 눌러주세요.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
