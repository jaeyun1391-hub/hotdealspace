name: Update Coupang Deals

on:
  workflow_dispatch:
  schedule:
    # 07:10 KST
    - cron: "10 22 * * *"

jobs:
  update-deals:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 45
    permissions:
      contents: write

    env:
      COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
      COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
      COUPANG_SUB_ID: ${{ secrets.COUPANG_SUB_ID }}
      COUPANG_SCRAPE_HEADLESS: "false"
      COUPANG_KEEP_PREVIOUS_ON_EMPTY: "true"
      CHROME_PATH: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Chrome
        shell: powershell
        run: |
          if (!(Test-Path $env:CHROME_PATH)) {
            throw "Chrome not found at $env:CHROME_PATH"
          }
          & $env:CHROME_PATH --version

      - name: Check required secrets
        shell: powershell
        run: |
          if (!$env:COUPANG_ACCESS_KEY) { throw "COUPANG_ACCESS_KEY is missing" }
          if (!$env:COUPANG_SECRET_KEY) { throw "COUPANG_SECRET_KEY is missing" }
          if (!$env:COUPANG_SUB_ID) { throw "COUPANG_SUB_ID is missing" }

      - name: Scrape Goldbox
        run: npm run scrape:goldbox

      - name: Scrape Seller Special
        run: npm run scrape:seller-special

      - name: Check scrape result
        run: |
          node -e "const fs=require('fs'); const goldbox=JSON.parse(fs.readFileSync('data/goldbox-scrape.json','utf8')); const seller=JSON.parse(fs.readFileSync('data/seller-special-scrape.json','utf8')); if (!goldbox.count || goldbox.count < 1) { throw new Error('No Goldbox products scraped'); } if (!seller.count || seller.count < 1) { throw new Error('No Seller Special products scraped'); } console.log({ goldbox: goldbox.count, seller: seller.count });"

      - name: Build
        run: npm run build

      - name: Commit updated deal data
        shell: powershell
        run: |
          git config user.name "hotdealspace-runner"
          git config user.email "actions@users.noreply.github.com"
          git add data/goldbox-scrape.json data/seller-special-scrape.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No deal data changes"
          } else {
            git commit -m "Update Coupang deal data"
            git push
          }
