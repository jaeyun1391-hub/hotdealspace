name: Update Coupang Deals

on:
  workflow_dispatch:
  schedule:
    # 07:10 KST
    - cron: "10 22 * * *"

jobs:
  update-deals:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
      COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
      COUPANG_SUB_ID: ${{ secrets.COUPANG_SUB_ID }}
      COUPANG_SCRAPE_HEADLESS: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape Goldbox
        run: xvfb-run --auto-servernum npm run scrape:goldbox

      - name: Scrape Seller Special
        run: xvfb-run --auto-servernum npm run scrape:seller-special

      - name: Check scrape result
        run: |
          node -e "const fs=require('fs'); const goldbox=JSON.parse(fs.readFileSync('data/goldbox-scrape.json','utf8')); const seller=JSON.parse(fs.readFileSync('data/seller-special-scrape.json','utf8')); if (!goldbox.count || goldbox.count < 1) { throw new Error('No Goldbox products scraped'); } if (!seller.count || seller.count < 1) { throw new Error('No Seller Special products scraped'); } console.log({ goldbox: goldbox.count, seller: seller.count });"

      - name: Build
        run: npm run build

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          echo '{"projectId":"prj_ihTAKHyUM37L3rkAyZbUd1zOU1Qh","orgId":"team_gC1grILaRVyjpWAmtH1m5SeO","projectName":"1-next-js-app-router-tailwind"}' > .vercel/project.json

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Verify production
        run: |
          node -e "Promise.all([fetch('https://www.hotdealspace.com/api/coupang/products?view=category&categoryId=goldbox&limit=100&refresh='+Date.now()).then(r=>r.json()), fetch('https://www.hotdealspace.com/api/coupang/products?view=category&categoryId=seller&limit=100&refresh='+Date.now()).then(r=>r.json())]).then(([goldbox, seller])=>{ console.log({ goldbox: goldbox.products?.length, seller: seller.products?.length }); if (goldbox.source !== 'scraped' || !goldbox.products?.length) throw new Error('Goldbox verification failed'); if (seller.source !== 'scraped' || !seller.products?.length) throw new Error('Seller verification failed'); })"
